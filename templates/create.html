{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">➕ สร้างเอกสารติดตามยาใหม่</h1>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">ชื่อยา</label>
            <input type="text" name="drug_name" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">วิธีใช้ยา</label>
            <textarea name="usage" required class="w-full p-2 border rounded" rows="3"></textarea>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">ราคายา (บาท)</label>
            <input type="number" step="0.01" name="price" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">ชื่อเภสัชกรผู้บันทึก</label>
            <input type="text" name="pharmacist_name" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">หมายเหตุ</label>
            <textarea name="notes" class="w-full p-2 border rounded" rows="2"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">💾 บันทึกและสร้าง QR Code</button>
    </form>
</div>
{% endblock %}
