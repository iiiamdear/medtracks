{% extends 'base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto">
    
    <div class="mb-6 flex items-center gap-3">
        <div class="p-2.5 bg-blue-50 text-blue-600 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">สร้างเอกสารติดตามยาใหม่</h1>
    </div>

    <form method="POST" action="/create" class="space-y-6" id="create-doc-form">
        
        <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-100 shadow-sm shadow-slate-100/50">
            <h2 class="text-base font-bold text-slate-700 mb-5 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> ข้อมูลผู้ป่วยและเจ้าหน้าที่
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">HN <span class="text-rose-500">*</span></label>
                    <input type="text" name="hn" required class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">ชื่อผู้ป่วย <span class="text-rose-500">*</span></label>
                    <input type="text" name="patient_name" required class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">สิทธิ์การรักษา <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <select name="rights" required class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none">
                            <option value="">-- เลือกสิทธิ์การรักษา --</option>
                            <option value="บัตรทอง">บัตรทอง</option>
                            <option value="ประกันสังคม">ประกันสังคม</option>
                            <option value="เบิกได้กรมบัญชีกลาง">เบิกได้กรมบัญชีกลาง</option>
                            <option value="เบิกได้อปท.">เบิกได้อปท.</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">แพทย์ผู้สั่งยา <span class="text-rose-500">*</span></label>
                    <input type="text" name="doctor" required class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-600 mb-2">เภสัชกรผู้รับผิดชอบ</label>
                    <div class="relative">
                        <select name="pharmacist_id" class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none">
                            <option value="">-- เลือกเภสัชกร --</option>
                            {% for p in pharmacists %}
                            <option value="{{ p.id }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <label class="block text-sm font-semibold text-slate-600 mb-2">หมายเหตุเพิ่มเติม</label>
                <textarea name="note" class="w-full px-3 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all" rows="2" placeholder="ระบุรายละเอียดหรือข้อควรระวัง (ถ้ามี)"></textarea>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-100 shadow-sm shadow-slate-100/50">
            <h2 class="text-base font-bold text-slate-700 mb-4 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-emerald-500 rounded-full"></span> รายการยาที่จัดส่ง
            </h2>

            <div id="items-container" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 item-row bg-slate-50/60 p-4 rounded-xl border border-slate-100 items-end">
                    
                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-slate-500 mb-1.5">ชื่อยา <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <select name="medicine_id[]" required onchange="calcRow(this)" class="medicine-select w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all appearance-none">
                                <option value="" data-price="0">-- เลือกยา --</option>
                                {% for med in medicines %}
                                <option value="{{ med.id }}" data-price="{{ med.price }}">{{ med.name }} ({{ med.unit }}) - {{ "%.2f"|format(med.price) }} บาท</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                    <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 mb-1.5">จำนวน <span class="text-rose-500">*</span></label>
                        <input type="number" name="quantity[]" min="1" value="1" required oninput="calcRow(this)" onchange="calcRow(this)" class="quantity-input w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all">
                    </div>

                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold text-slate-500 mb-1.5">วิธีใช้ยา / Dose <span class="text-rose-500">*</span></label>
                        <input type="text" name="dose[]" required placeholder="เช่น 1 เม็ด เช้า-เย็น" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 mb-1.5">ราคารวม</label>
                        <div class="row-total px-3 py-2 bg-emerald-50 border border-emerald-100 rounded-lg text-sm font-semibold text-emerald-700 text-right" data-value="0">
                            0.00 ฿
                        </div>
                    </div>

                    <div class="md:col-span-1">
                        <button type="button" onclick="removeRow(this)" class="w-full inline-flex justify-center items-center bg-white hover:bg-rose-50 text-rose-500 hover:text-rose-600 font-medium py-2 px-2 border border-slate-200 hover:border-rose-200 rounded-lg text-sm transition-colors duration-150">
                            🗑️
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4 flex items-center justify-between">
                <button type="button" onclick="addRow()" class="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 font-semibold px-4 py-2.5 rounded-xl text-sm transition-colors duration-150">
                    ➕ เพิ่มรายการยา
                </button>
            </div>

            <div class="mt-5 pt-5 border-t border-slate-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-semibold text-slate-500">ราคารวมทั้งหมด</p>
                        <p class="text-xs text-slate-400 mt-0.5">คำนวณจากราคายา × จำนวน</p>
                    </div>
                    <div class="text-right">
                        <p id="grand-total" class="text-2xl font-bold text-emerald-600">0.00 ฿</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full inline-flex justify-center items-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-2xl text-base shadow-sm shadow-blue-200 hover:shadow-md transition-all duration-150">
                💾 บันทึกเอกสารติดตามยา
            </button>
        </div>
    </form>
</div>

<script>
    function calcRow(el) {
        const row = el.closest('.item-row');
        const select = row.querySelector('.medicine-select');
        const qty = parseFloat(row.querySelector('.quantity-input').value) || 0;
        
        // 🟢 ดึงราคาโดยตรงจาก attribute 'data-price' ของ option ที่ถูกเลือก (เสถียรที่สุด ไม่เสี่ยงบั๊กพิมพ์ชื่อตัวแปรผิด)
        const selectedOption = select.options[select.selectedIndex];
        const price = parseFloat(selectedOption.getAttribute('data-price')) || 0;
        
        const total = price * qty;
        
        const totalBox = row.querySelector('.row-total');
        totalBox.setAttribute('data-value', total);
        totalBox.textContent = total.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ฿';
        
        calcGrandTotal();
    }

    function calcGrandTotal() {
        const totals = document.querySelectorAll('.row-total');
        let grand = 0;
        totals.forEach(el => {
            grand += parseFloat(el.getAttribute('data-value')) || 0;
        });
        document.getElementById('grand-total').textContent = grand.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ฿';
    }

    function addRow() {
        const container = document.getElementById('items-container');
        const firstRow = container.querySelector('.item-row');
        
        // Clone แถวออกมา
        const newRow = firstRow.cloneNode(true);

        // รีเซ็ตค่าภายในช่องอินพุตใหม่ทั้งหมดเพื่อความสะอาด
        newRow.querySelectorAll('input').forEach(input => {
            if (input.name === 'quantity[]') {
                input.value = 1;
            } else {
                input.value = '';
            }
        });

        newRow.querySelectorAll('select').forEach(select => {
            select.selectedIndex = 0;
        });

        // ล้างราคารวมของแถวใหม่ให้เป็น 0
        const newTotalBox = newRow.querySelector('.row-total');
        newTotalBox.setAttribute('data-value', '0');
        newTotalBox.textContent = '0.00 ฿';

        container.appendChild(newRow);
        calcGrandTotal(); // คำนวณราคารวมก้อนใหญ่อีกครั้งหลังจากเพิ่มแถวสำเร็จ
    }

    function removeRow(button) {
        const container = document.getElementById('items-container');
        const rows = container.querySelectorAll('.item-row');
        
        // ดักคุมไม่ให้เผลอลบแถวรายการยาจนเกลี้ยงหน้าจอ
        if (rows.length > 1) {
            const currentRow = button.closest('.item-row');
            currentRow.remove();
            calcGrandTotal(); // คำนวณราคารวมก้อนใหญ่ใหม่ทันทีหลังจากลบ HTML แถวนั้นออกไปแล้ว
        } else {
            alert('จำเป็นต้องมีรายการยาอย่างน้อย 1 รายการในเอกสาร');
        }
    }
</script>
{% endblock %}
