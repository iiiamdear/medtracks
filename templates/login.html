<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - MedTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1a5276, #1a7a4a);">
  <div class="card p-4" style="width:100%; max-width:400px;">
    <div class="text-center mb-4">
      <i class="bi bi-capsule-pill text-success" style="font-size:3rem;"></i>
      <h4 class="fw-bold mt-2">MedTrack</h4>
      <p class="text-muted small">ระบบติดตามเอกสารยา</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-bold">ชื่อผู้ใช้</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="กรอกชื่อผู้ใช้" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ
      </button>
    </form>
  </div>
</div>
</body>
</html>
