{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">🔑 Login Admin</h1>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Username</label>
            <input type="text" name="username" required class="w-full p-2 border rounded">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2">Password</label>
            <input type="password" name="password" required class="w-full p-2 border rounded">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">เข้าสู่ระบบ</button>
    </form>
    <div class="mt-4 text-sm text-gray-500 text-center">
        * Admin เริ่มต้น: <strong>username:</strong> admin | <strong>password:</strong> admin1234
    </div>
</div>
{% endblock %}
