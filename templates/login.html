{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center items-center px-4">
    <div class="w-full max-w-sm">

        <!-- Icon + Title -->
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-blue-50 text-blue-600 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">เข้าสู่ระบบ</h1>
            <p class="text-sm text-slate-400 mt-1">MedTrack Admin Panel</p>
        </div>

        <!-- Alerts -->
        {% if success_msg %}
        <div class="mb-4 p-3 rounded-xl bg-emerald-50 text-emerald-700 border border-emerald-100 text-sm flex items-center gap-2">
            <span>✅</span> {{ success_msg }}
        </div>
        {% endif %}

        {% if error %}
        <div class="mb-4 p-3 rounded-xl bg-rose-50 text-rose-600 border border-rose-100 text-sm flex items-center gap-2">
            <span>⚠️</span> {{ error }}
        </div>
        {% endif %}

        <!-- Card -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <form method="POST" action="/login" class="space-y-4">

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Username</label>
                    <input 
                        type="text" name="username" required 
                        placeholder="ระบุชื่อผู้ใช้งาน"
                        class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-300 focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-500/10 focus:bg-white transition-all"
                    >
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
                    <input 
                        type="password" name="password" required 
                        placeholder="••••••••"
                        class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-300 focus:outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-500/10 focus:bg-white transition-all"
                    >
                </div>

                <button 
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-all mt-1"
                >
                    เข้าสู่ระบบ
                </button>

            </form>
        </div>

    </div>
</div>
{% endblock %}
