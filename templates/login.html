{% extends "base.html" %}
{% block title %}เข้าสู่ระบบ - MedTrack{% endblock %}

{% block layout %}
<!-- Override layout ทั้งหมด ไม่มี sidebar -->
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1a5276, #1a7a4a);">
  <div class="card p-4" style="width:100%; max-width:400px;">
    <div class="text-center mb-4">
      <i class="bi bi-capsule-pill text-success" style="font-size:3rem;"></i>
      <h4 class="fw-bold mt-2">MedTrack</h4>
      <p class="text-muted small">ระบบติดตามเอกสารยา</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-bold">ชื่อผู้ใช้</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" name="username" class="form-control"
                 placeholder="กรอกชื่อผู้ใช้" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" class="form-control"
                 placeholder="กรอกรหัสผ่าน" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
      </button>
    </form>
  </div>
</div>
{% endblock %}
