<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการผู้ใช้งาน - MedTracks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">MedTracks</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-light me-3">ผู้ใช้: {{ user.username }} ({{ user.role }})</span>
                <a class="btn btn-outline-danger btn-sm" href="#" onclick="document.getElementById('logout-form').submit();">ออกจากระบบ</a>
                <form id="logout-form" action="/logout" method="post" style="display: none;"></form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people-fill"></i> จัดการผู้ใช้งานในระบบ</h2>
            <a href="/" class="btn btn-secondary">กลับหน้าหลัก</a>
        </div>

        <div class="row">
            <!-- ฟอร์มเพิ่มผู้ใช้ -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">เพิ่มผู้ใช้งานใหม่</h5>
                    </div>
                    <div class="card-body">
                        <form action="/users/add" method="post">
                            <div class="mb-3">
                                <label class="form-label">ชื่อผู้ใช้ (Username)</label>
                                <input type="text" class="form-control" name="username" required placeholder="เช่น staff2">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">รหัสผ่าน (Password)</label>
                                <input type="password" class="form-control" name="password" required placeholder="รหัสผ่าน">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ระดับสิทธิ์ (Role)</label>
                                <select class="
